<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>West Africa Sound Map</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Mapbox GL JS -->
  <link
    href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css"
    rel="stylesheet"
  />
</head>
<body>
  <div id="app">

    <!-- Fullscreen map -->
    <div id="map"></div>

    <!-- Top status fade / mood layer -->
    <div class="screen-vignette"></div>

    <!-- Search bar -->
    <div class="search-wrap">
      <div class="search-bar">
        <span class="search-icon">⌕</span>
        <input
          id="searchInput"
          type="text"
          placeholder="Fogo Cape Verde"
          autocomplete="off"
        />
        <button id="clearSearch" class="clear-btn" aria-label="Clear search">✕</button>
      </div>
    </div>

    <!-- Right controls -->
    <div class="map-controls">
      <button id="styleToggle" class="control-btn" aria-label="Toggle map style">
        <span>▥</span>
      </button>
      <button id="locateBtn" class="control-btn" aria-label="Locate me">
        <span>⌖</span>
      </button>
    </div>

    <!-- Bottom mini player -->
    <div id="miniPlayer" class="mini-player hidden">
      <div class="mini-player-inner">
        <div class="mini-meta">
          <div id="miniTitle" class="mini-title">Song Title</div>
          <div id="miniLocation" class="mini-location">Location</div>
        </div>
        <div class="mini-actions">
          <button id="openSheetBtn" class="mini-open">Open</button>
        </div>
      </div>
    </div>

    <!-- Bottom sheet -->
    <div id="sheetBackdrop" class="sheet-backdrop hidden"></div>
    <section id="songSheet" class="song-sheet hidden" aria-hidden="true">
      <div class="sheet-handle"></div>

      <div class="sheet-header">
        <div class="sheet-pill">Unlocked Location</div>
        <h2 id="sheetTitle">Volcano Echoes</h2>
        <p id="sheetPlace">Pico do Fogo, Cape Verde</p>
      </div>

      <div class="sheet-art-wrap">
        <img
          id="sheetArt"
          src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1200&q=80"
          alt="Song artwork"
        />
      </div>

      <div class="sheet-player">
        <audio id="audioPlayer" controls preload="metadata"></audio>
      </div>

      <div class="sheet-copy">
        <p id="sheetDescription">
          A location-based song unlocked through your journey across West Africa.
        </p>
      </div>

      <div class="sheet-actions">
        <button id="playSongBtn" class="primary-btn">Play Song</button>
        <button id="closeSheetBtn" class="secondary-btn">Close</button>
      </div>
    </section>
  </div>

  <!-- Mapbox GL JS -->
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>
  <script src="script.js"></script>
</body>
</html>
